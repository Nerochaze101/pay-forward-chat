  <script>
    // Auto-scroll logic
    let scrollingDown = true;
    function autoScroll() {
      const step = 2;
      if (scrollingDown) {
        window.scrollBy(0, step);
        if ((window.innerHeight + window.scrollY) >= document.body.scrollHeight - 2) {
          scrollingDown = false;
        }
      } else {
        window.scrollBy(0, -step);
        if (window.scrollY <= 0) {
          scrollingDown = true;
        }
      }
    }
    // Scroll every 30ms for smooth movement, pause direction change every 2-4s
    setInterval(autoScroll, 30);
  </script>
